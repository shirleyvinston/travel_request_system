<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Signup</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <style>

    body{

        margin:0;

        min-height:100vh;

        display:flex;

        justify-content:center;

        align-items:center;

        overflow:hidden;
    }

    .signup-container{

        width:450px;

        background:rgba(255,255,255,0.10);

        backdrop-filter:blur(14px);

        padding:45px;

        border-radius:30px;

        box-shadow:
            0 10px 35px rgba(0,0,0,0.25);

        position:relative;

        z-index:2;
    }

    .logo-container{

        text-align:center;

        margin-bottom:20px;
    }

    .logo{

        width:110px;

        height:110px;

        object-fit:contain;
    }

    .signup-title{

        color:white;

        text-align:center;

        font-size:48px;

        font-weight:bold;

        margin-bottom:35px;
    }

    .form-group{

        margin-bottom:22px;
    }

    label{

        color:white;

        display:block;

        margin-bottom:10px;

        font-weight:bold;
    }

    input{

        width:100%;

        padding:14px;

        border:none;

        border-radius:14px;

        font-size:16px;

        box-sizing:border-box;

        outline:none;
    }

    .signup-btn{

        width:100%;

        margin-top:20px;

        padding:15px;

        border:none;

        border-radius:14px;

        background:#00bcd4;

        color:white;

        font-size:18px;

        font-weight:bold;

        cursor:pointer;

        transition:0.3s;
    }

    .signup-btn:hover{

        background:#0097a7;
    }

    .login-text{

        margin-top:25px;

        text-align:center;

        color:white;

        font-size:16px;
    }

    .login-text a{

        color:#9ff3ff;

        text-decoration:none;

        font-weight:bold;
    }

    .login-text a:hover{

        text-decoration:underline;
    }

    @media(max-width:500px){

        .signup-container{

            width:90%;

            padding:30px;
        }

        .signup-title{

            font-size:38px;
        }

    }

    </style>

</head>

<body>

<!-- ===================================== -->
<!-- BACKGROUND -->
<!-- ===================================== -->

<div class="background-animation">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!-- ===================================== -->
<!-- SIGNUP CARD -->
<!-- ===================================== -->

<div class="signup-container">

    <!-- LOGO -->

    <div class="logo-container">

        <img
            src="{{ url_for('static', filename='images/logo.png') }}"
            class="logo"
            alt="Company Logo"
        >

    </div>

    <!-- TITLE -->

    <div class="signup-title">

        Employee Signup

    </div>

    <!-- FORM -->

    <form method="POST">

        <!-- EMPLOYEE NAME -->

        <div class="form-group">

            <label>

                Employee Name

            </label>

            <input
                type="text"
                name="emp_name"
                required
            >

        </div>
        <!-- USERNAME -->

        <div class="form-group">

            <label>

                Username

            </label>

            <input
                type="text"
                name="username"
                required
            >

        </div>
<div class="form-group">

    <label>Email</label>

    <input
        type="email"
        name="email"
        required
    >

</div>
        <!-- PASSWORD -->

        <div class="form-group">

            <label>

                Password

            </label>

            <input
                type="password"
                name="password"
                required
            >

        </div>

        <!-- BUTTON -->

        <button
            type="submit"
            class="signup-btn"
        >

            Signup

        </button>

    </form>

    <!-- LOGIN -->

    <div class="login-text">

        Already have an account?

        <a href="/login">

            Login

        </a>

    </div>

</div>

</body>

</html>
